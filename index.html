<body>

    <header class="header">
      <a href="#home" class="logo">
        Daniel <span>Levino</span>
      </a>

      <i class="bi bi-list" id="menu-icon"></i>

      <nav id="navbar" class="navbar">

      </nav>
    </header>

    <section class="home" id="home">
      <div class="home-content">
        <h1 id="home-title"></h1>
        <h3 class="text-animation"><span id="home-iam"></span><span id="typing"></span>|</h3>
        <p id="home-resume"></p>
        <div class="social-icons">
          <a href="https://www.linkedin.com/in/daniellevino/" target="_blank"><i class="bi bi-linkedin"></i></a>
          <a href="https://github.com/DanielLevino" target="_blank"><i class="bi bi-github"></i></a>
          <a href="https://www.instagram.com/daniel.levinob/" target="_blank"><i class="bi bi-instagram"></i></a>

        <div class="btn-group">

      <div class="home-img">

      <div class="timeline-items">

        <div class="timeline-item">

            <p id="educ-desc-3"></p>
          </div>
        </div>

        <div class="timeline-item">
          <div class="timeline-dot"></div>
          <div class="timeline-date">2025</div>
          <div class="timeline-content">
            <h3 id="educ-title-4"></h3>
            <p id="educ-desc-4"></p>

    <section class="services" id="services">
      <h2 class="heading"></h2>

        <div class="service-box">

        <div class="service-box">
          <div class="service-info">

      <div class="container swiper">
        <div class="card-wrapper">

            <li class="card-item swiper-slide"></li>
            <li class="card-item swiper-slide"></li>
            <li class="card-item swiper-slide"></li>
            <li class="card-item swiper-slide"></li>
          </ul>
          <div class="swiper-pagination"></div>
          <div class="swiper-btn swiper-button-prev"></div>
          <div class="swiper-btn swiper-button-next"></div>
        </div>
      </div>

      <div class="curriculo-container">

        <div class="btn-group"></div>

      <h2 class="heading"></h2>

      <div class="social">
        <a href="https://www.linkedin.com/in/daniellevino/"><i class="bi bi-linkedin"></i></a>
